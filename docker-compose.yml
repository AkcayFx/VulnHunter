version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vulnhunter-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-vulnhunter}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Builds vulnhunter-sandbox:latest; exits immediately so app can depend on image presence.
  vulnhunter-sandbox:
    image: vulnhunter-sandbox:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.sandbox
    command: ["sleep", "0"]
    restart: "no"
    networks:
      - sandbox

  vulnhunter:
    build: .
    image: vulnhunter:latest
    container_name: vulnhunter-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      vulnhunter-sandbox:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-nvidia/nemotron-3-super-120b-a12b:free}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set}
      VULNHUNTER_CONFIG_PATH: /app/config/default.yaml
      VULNHUNTER_SANDBOX_ENABLED: ${VULNHUNTER_SANDBOX_ENABLED:-true}
      VULNHUNTER_SANDBOX_NET_ADMIN: ${VULNHUNTER_SANDBOX_NET_ADMIN:-false}
    ports:
      - "8477:8477"
    volumes:
      - ./reports:/app/reports
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
    networks:
      - default
      - sandbox

networks:
  sandbox:
    name: vulnhunter-sandbox
    driver: bridge

volumes:
  pgdata:
