<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VulnHunter - AI Agents for Penetration Testing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">

  <!-- AUTH -->
  <div id="auth-screen" class="auth-overlay">
    <div class="auth-bg-grid"></div>
    <div class="auth-glow auth-glow-1"></div>
    <div class="auth-glow auth-glow-2"></div>
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <svg width="24" height="24" viewBox="0 0 32 32" fill="none"><path d="M16 2L4 8v8c0 7.7 5.1 14.9 12 16.8C22.9 30.9 28 23.7 28 16V8L16 2z" stroke="#dc2626" stroke-width="1.5" fill="rgba(220,38,38,0.1)"/><circle cx="16" cy="14" r="4" fill="#dc2626"/></svg>
        </div>
        <div>
          <h1 class="auth-title">VulnHunter</h1>
          <p class="auth-sub">AI Agents for Penetration Testing</p>
        </div>
      </div>
      <div class="tab-bar"><button class="tab active" data-tab="login">Sign In</button><button class="tab" data-tab="register">Register</button></div>
      <form id="login-form" class="auth-form" novalidate>
        <div class="field-group"><label>Email</label><input type="email" id="li-email" placeholder="analyst@example.com" required></div>
        <div class="field-group"><label>Password</label><input type="password" id="li-pass" placeholder="••••••••" required></div>
        <button type="submit" class="btn-primary btn-full" id="login-btn"><span>Sign In</span></button>
      </form>
      <form id="reg-form" class="auth-form" style="display:none" novalidate>
        <div class="field-group"><label>Name</label><input type="text" id="re-name" placeholder="Security Analyst"></div>
        <div class="field-group"><label>Email</label><input type="email" id="re-email" placeholder="analyst@example.com" required></div>
        <div class="field-group"><label>Password</label><input type="password" id="re-pass" placeholder="Min. 8 characters" required minlength="8"></div>
        <button type="submit" class="btn-primary btn-full" id="reg-btn"><span>Create Account</span></button>
      </form>
      <div id="auth-msg" class="auth-msg"></div>
      <div class="auth-divider"><span>or</span></div>
      <button class="btn-ghost btn-full" id="guest-btn">Continue as Guest</button>
      <p class="auth-note">Guest mode: scanning works, history requires login</p>
    </div>
  </div>

  <!-- THREE-PANEL SHELL -->
  <div id="shell" class="shell" style="display:none">

    <!-- LEFT: Flows -->
    <aside class="panel-left" id="panel-left">
      <div class="pl-header">
        <div class="pl-brand">
          <div class="pl-logo">
            <svg width="16" height="16" viewBox="0 0 32 32" fill="none"><path d="M16 2L4 8v8c0 7.7 5.1 14.9 12 16.8C22.9 30.9 28 23.7 28 16V8L16 2z" stroke="#dc2626" stroke-width="1.5" fill="rgba(220,38,38,0.15)"/><circle cx="16" cy="14" r="3" fill="#dc2626"/></svg>
          </div>
          <span class="pl-name">VulnHunter</span>
        </div>
      </div>

      <div class="pl-section">
        <span>Flows</span>
        <button class="pl-new-btn" id="new-flow-btn" title="New Flow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg></button>
      </div>

      <div class="pl-flows" id="flow-list"></div>

      <div class="pl-footer">
        <div class="pl-user">
          <div class="pl-avatar" id="pl-avatar">A</div>
          <div class="pl-user-info">
            <span class="pl-user-name" id="pl-user-name">admin</span>
            <span class="pl-user-email" id="pl-user-email">admin@vulnhunter.com</span>
          </div>
          <button class="pl-icon-btn" id="logout-btn" title="Sign Out">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- CENTER: Chat -->
    <main class="panel-center" id="panel-center">
      <div class="pc-header">
        <button class="pc-menu-btn" id="pc-menu-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
        <span class="pc-flow-name" id="pc-flow-name">VulnHunter - AI Agents for Penetration Testing</span>
        <div class="pc-tabs">
          <button class="pc-tab active" data-ctab="automation">Automation</button>
        </div>
        <div class="pc-actions">
          <button class="pc-hicon" id="pc-toggle-right" title="Toggle panel"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M15 3v18"/></svg></button>
        </div>
      </div>

      <div class="pc-messages" id="chat-messages"></div>

      <div class="pc-input-area">
        <div class="pc-input-wrap">
          <textarea class="pc-input" id="chat-input" placeholder="Provide additional context or instructions..." rows="1"></textarea>
          <button class="pc-send-btn" id="chat-send" title="Send">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          </button>
        </div>
      </div>

      <div class="pc-statusbar" id="statusbar">
        <div class="pc-status-spinner"></div>
        <span class="pc-status-text" id="status-text">VulnHunter is working... Click Stop to interrupt</span>
        <button class="pc-stop-btn" id="stop-btn">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
          Stop
        </button>
      </div>
    </main>

    <!-- RIGHT: Tabs -->
    <aside class="panel-right" id="panel-right">
      <div class="pr-tabs">
        <button class="pr-tab active" data-rtab="terminal">Terminal</button>
        <button class="pr-tab" data-rtab="tasks">Tasks</button>
        <button class="pr-tab" data-rtab="agents">Agents</button>
        <button class="pr-tab" data-rtab="searches">Searches</button>
      </div>

      <div class="pr-content">
        <div class="pr-pane active" data-rpane="terminal">
          <div id="xterm-container" class="xterm-wrap"></div>
        </div>
        <div class="pr-pane" data-rpane="tasks">
          <div id="tasks-list" class="tasks-list"></div>
        </div>
        <div class="pr-pane" data-rpane="agents">
          <div id="agents-list" class="agents-list"></div>
        </div>
        <div class="pr-pane" data-rpane="searches">
          <div id="searches-list" class="searches-list"></div>
        </div>
      </div>
    </aside>
  </div>

  <div id="toasts" class="toasts"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
